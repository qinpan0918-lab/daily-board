services:
  - type: web
    name: daily-board
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: GH_TOKEN
        sync: false  # 需要在 Render Dashboard 手动填入 GitHub Personal Access Token
      - key: GITHUB_REPO
        value: qinpan0918-lab/daily-board
